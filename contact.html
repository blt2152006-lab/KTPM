<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Liên hệ – AuditPro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="logo">
        <img src="audit.png" alt="Logo Công ty">
      </a>
      <nav>
        <a href="index.html">Trang Chủ</a>
        <a href="services.html">Dịch Vụ</a>
        <a href="contact.html">Liên Hệ</a>
      </nav>
    </div>
  </header>


  <main>
    <aside class="sidebar">
      <h3>Tư vấn ngay</h3>
      <form action="/contact" method="POST">
        <input type="hidden" name="honey" value="">
        <label>Họ tên*</label>
        <input type="text" name="name" required>
        <label>Email*</label>
        <input type="email" name="email" required>
        <label>Số điện thoại</label>
        <input type="tel" name="phone">
        <label>Nội dung</label>
        <textarea name="message"></textarea>
        <button type="submit" class="btn btn-secondary">Gửi</button>
      </form>
    </aside>
    <section class="content">
      <!-- Nội dung dài hơn, có thể chia phần sub-heading -->
    </section>
  </main>

  <footer>
    <div class="container footer-container">
  
      <div class="footer-col">
        <h3>AuditPro</h3>
        <p>Công ty TNHH Tư vấn Kiểm toán AuditPro</p>
        <p>Địa chỉ: Hà Nội</p>
        <p>Email: info@example.com</p>
      </div>
  
      <div class="footer-col">
        <h3>Menu</h3>
        <a href="index.html">Trang Chủ</a>
        <a href="services.html">Dịch Vụ</a>
        <a href="contact.html">Liên Hệ</a>
      </div>
  
      <div class="footer-col">
        <h3>Mạng xã hội</h3>
        <a href="#">Facebook</a>
        <a href="#">Zalo</a>
        <a href="#">LinkedIn</a>
      </div>
  
    </div>
  
    <div class="footer-bottom">
      <p>© 2026 AuditPro. All rights reserved.</p>
    </div>
  </footer>
  
</body>
</html>
